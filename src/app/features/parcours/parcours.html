<section id="parcours">
  <div class="container">
    <div class="section-label">Mon parcours</div>
    <h2 class="section-title">Expériences &<br/>formations</h2>

    <div class="timeline-grid">

      <div class="timeline-col">
        <div class="timeline-col-label">Formation</div>
        @for (item of data.formation; track item.title) {
          <div class="timeline-item">
            <div class="timeline-date">{{ item.date }}</div>
            <div class="timeline-title">{{ item.title }}</div>
            <div class="timeline-org">{{ item.org }}</div>
            <div class="timeline-desc">{{ item.desc }}</div>
          </div>
        }
      </div>

      <div class="timeline-col">
        <div class="timeline-col-label lime">Professionnel</div>
        @for (item of data.experience; track item.title) {
          <div class="timeline-item lime">
            <div class="timeline-date lime">{{ item.date }}</div>
            <div class="timeline-title">{{ item.title }}</div>
            <div class="timeline-org">{{ item.org }}</div>
            <div class="timeline-desc">{{ item.desc }}</div>
          </div>
        }
      </div>

    </div>
  </div>
</section>
